<!DOCTYPE>
<html lang="en">
<head>
    <title>To-Do List</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= devide-width", initial-scale="1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">To-Do List</h1>
        <div class="card">
            <div class="task">
                <h2>Task</h2>
            </div>
            <div class="enter">
                <input id="inputTask" type="text" placeholder="Enter task here...">
                <button id="addBtn">Add</button>
            </div>
        </div>

        <div class="list">
            <ul id="taskList">
            </ul>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
